<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>벽시계 모드 선택</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrap {
      width: min(90vw, 900px);
    }

    h1 {
      margin: 0 0 56px;
      font-size: clamp(42px, 6vw, 82px);
      color: #ffd400;
      font-weight: 950;
    }

    .buttons {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(38vw, 330px);
      min-width: 260px;
      height: 150px;
      border: 4px solid #ffd400;
      border-radius: 28px;
      color: #fff;
      text-decoration: none;
      font-size: clamp(34px, 4.5vw, 58px);
      font-weight: 950;
      background: #111;
    }

    a:focus,
    a:hover {
      background: #ffd400;
      color: #000;
    }

    .note {
      margin-top: 48px;
      font-size: 22px;
      color: #bbb;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>벽시계 모드 선택</h1>

    <div class="buttons">
      <a href="./landscape.html">가로 모드</a>
      <a href="./portrait.html">세로 모드</a>
    </div>

    <p class="note">
      TV 또는 모니터 방향에 맞는 모드를 선택하세요.
    </p>
  </main>
</body>
</html>
