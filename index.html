<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>벽시계 프로그램</title>

  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --yellow: #ffd400;
      --muted: #f2f2f2;

      /* 32인치 16:9 가로 모니터 기준 글자 크기 */
      --top-size: clamp(24px, 2.2vw, 48px);
      --weekday-size: clamp(38px, 3.3vw, 73px);
      --time-label-size: clamp(24px, 2.3vw, 46px);
      --time-size: clamp(49px, 4.3vw, 92px);
      --task-size: clamp(41px, 3.8vw, 81px);
      --notice-size: clamp(32px, 3.2vw, 69px);
      --small-ui-size: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .screen {
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1.05fr 1.1fr 1.25fr 1.15fr;
      align-items: center;
      justify-items: center;
      padding: 5.2vh 4vw 6vh;
      background: #000;
      text-align: center;
      transition: transform 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
    }

    /*
      보호 모드
      - 월~토 08:25~17:25 노치원에 있는 시간에 적용
      - 표시 내용은 그대로 유지
      - 밝기만 낮춤
    */
    body.away-protect-mode .screen {
      opacity: 0.3;
      filter: brightness(0.55);
    }

    body.temp-bright .screen {
      opacity: 1;
      filter: brightness(1);
    }

    .line {
      width: min(94vw, 1780px);
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.44em;
      flex-wrap: wrap;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .top-line {
      font-size: var(--top-size);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .weekday {
      color: var(--yellow);
      font-size: var(--weekday-size);
      line-height: 1;
      text-decoration-line: underline;
      text-decoration-thickness: 0.07em;
      text-underline-offset: 0.12em;
    }

    .time-line {
      line-height: 1.05;

      /*
        2열 수정 사항
        - "현재 시간"과 "오전/오후 ??시 ??분" 사이를 약 두 글자 폭으로 띄움
        - 작은 글자인 "현재 시간"을 큰 시간 글자와 세로 중앙 정렬
      */
      gap: 2em;
      align-items: center;
    }

    .time-label {
      font-size: var(--time-label-size);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1;
      transform: translateY(0.03em);
    }

    .time-value {
      font-size: var(--time-size);
      font-weight: 950;
      letter-spacing: 0.01em;
      white-space: nowrap;
      line-height: 1;
    }

    .task-line {
      color: var(--yellow);
      font-size: var(--task-size);
      line-height: 1.16;
      font-weight: 950;
      letter-spacing: 0.01em;
    }

    .task-line.two-lines {
      flex-direction: column;
      gap: 0.14em;
      align-items: center;
    }

    .notice-line {
      font-size: var(--notice-size);
      line-height: 1.2;
      font-weight: 950;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .notice-line.multi-lines {
      flex-direction: column;
      gap: 0.12em;
      align-items: center;
    }

    .notice-highlight {
      color: var(--yellow);
      text-shadow: 0 0 12px rgba(255, 212, 0, 0.22);
      white-space: nowrap;
    }

    .mode-label,
    .helper {
      position: fixed;
      bottom: 12px;
      font-size: var(--small-ui-size);
      letter-spacing: 0;
      color: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .mode-label {
      left: 16px;
    }

    .helper {
      right: 16px;
    }

    @media (orientation: portrait) {
      .screen {
        transform: rotate(0deg);
        padding: 4vh 3vw;
      }

      :root {
        --top-size: clamp(18px, 3.5vw, 34px);
        --weekday-size: clamp(28px, 4.9vw, 49px);
        --time-label-size: clamp(18px, 3.5vw, 34px);
        --time-size: clamp(32px, 5.6vw, 55px);
        --task-size: clamp(27px, 4.9vw, 50px);
        --notice-size: clamp(22px, 4.2vw, 43px);
      }
    }
  </style>
</head>

<body>
  <main class="screen" aria-label="벽시계 프로그램 화면">
    <section class="line top-line" aria-label="오늘 날짜와 요일">
      <span>오늘은</span>
      <span id="dateText">2026년 6월 12일</span>
      <span id="weekdayText" class="weekday">금요일</span>
      <span>입니다.</span>
    </section>

    <section class="line time-line" aria-label="현재 시간">
      <span class="time-label">현재 시간</span>
      <span id="timeText" class="time-value">아침 07시 00분</span>
    </section>

    <section id="taskLine" class="line task-line" aria-label="현재 할일">
      <span id="taskText">지금은 노치원 갈 준비 시간</span>
    </section>

    <section id="noticeLine" class="line notice-line" aria-label="노치원 안내">
      <span id="noticeText">노치원 갈 시간 <span class="notice-highlight">1시간 25분</span> 남았습니다.</span>
    </section>

    <div id="modeLabel" class="mode-label">일반 모드</div>
    <div id="helper" class="helper">화면 클릭 시 전체화면</div>
  </main>

  <script>
    /*
      벽시계 프로그램 제작 조건 반영 버전

      주요 시간 기준
      - 노치원 등원: 월~토 오전 8시 25분
      - 노치원 귀가: 월~토 오후 5시 25분
      - 보호 모드: 월~토 08:25~17:25
      - 일반 모드: 그 외 시간
      - 화면 위치 이동: 일반/보호 모드 모두 5분마다 -10px ~ +10px
      - 보호 모드 터치 시 60초 정상 밝기
    */

    const PLACE_NAME = "노치원";

    const GO_HOUR = 8;
    const GO_MINUTE = 25;

    const RETURN_HOME_HOUR = 17;
    const RETURN_HOME_MINUTE = 25;

    const EXERCISE_START_HOUR = 17;
    const EXERCISE_START_MINUTE = 25;

    const SLEEP_START_HOUR = 21;
    const SLEEP_END_HOUR = 7;

    const PREPARE_START_HOUR = 7;

    const SUNDAY_COUNTDOWN_START_HOUR = 13;
    const WEEKDAY_COUNTDOWN_START_HOUR = 19;

    const TEMP_BRIGHT_SECONDS = 60;

    const dateTextEl = document.getElementById("dateText");
    const weekdayTextEl = document.getElementById("weekdayText");
    const timeTextEl = document.getElementById("timeText");
    const taskTextEl = document.getElementById("taskText");
    const taskLineEl = document.getElementById("taskLine");
    const noticeTextEl = document.getElementById("noticeText");
    const noticeLineEl = document.getElementById("noticeLine");
    const modeLabelEl = document.getElementById("modeLabel");
    const helperEl = document.getElementById("helper");

    const dayNames = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];

    let tempBrightTimer = null;
    let wakeLock = null;

    function pad2(number) {
      return String(number).padStart(2, "0");
    }

    function getDateText(now) {
      return `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
    }

    function getTimePeriod(hour24) {
      if (hour24 >= 19 && hour24 < 24) return "저녁";
      if (hour24 >= 0 && hour24 < 6) return "새벽";
      if (hour24 >= 6 && hour24 < 9) return "아침";
      if (hour24 >= 9 && hour24 < 12) return "오전";
      return "오후";
    }

    function getDisplayHour(hour24) {
      const hour12 = hour24 % 12;
      return hour12 === 0 ? 12 : hour12;
    }

    function getTimeText(now) {
      const hour24 = now.getHours();
      const period = getTimePeriod(hour24);
      const hour = getDisplayHour(hour24);
      const minute = now.getMinutes();
      return `${period} ${pad2(hour)}시 ${pad2(minute)}분`;
    }

    function isGoingDay(date) {
      const day = date.getDay();
      return day >= 1 && day <= 6; // 월~토
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function getGoTime(date) {
      const result = new Date(date);
      result.setHours(GO_HOUR, GO_MINUTE, 0, 0);
      return result;
    }

    function getReturnHomeTime(date) {
      const result = new Date(date);
      result.setHours(RETURN_HOME_HOUR, RETURN_HOME_MINUTE, 0, 0);
      return result;
    }

    function getNextGoingDateAfter(date) {
      let candidate = addDays(date, 1);

      for (let i = 0; i < 7; i++) {
        if (isGoingDay(candidate)) return candidate;
        candidate = addDays(candidate, 1);
      }

      return candidate;
    }

    function getCountdownTarget(now) {
      const todayGoTime = getGoTime(now);

      if (isGoingDay(now) && now < todayGoTime) {
        return todayGoTime;
      }

      return getGoTime(getNextGoingDateAfter(now));
    }

    function formatRemaining(ms) {
      const totalMinutes = Math.max(0, Math.ceil(ms / 60000));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours > 0) {
        return `<span class="notice-highlight">${hours}시간 ${pad2(minutes)}분</span>`;
      }

      return `<span class="notice-highlight">${minutes}분</span>`;
    }

    function isPatientAwayAtNochiwon(now) {
      if (!isGoingDay(now)) return false;

      const goTime = getGoTime(now);
      const returnHomeTime = getReturnHomeTime(now);

      return now >= goTime && now < returnHomeTime;
    }

    function countdownNotice(now, secondLine) {
      const target = getCountdownTarget(now);
      const firstLine = `${PLACE_NAME} 갈 시간 ${formatRemaining(target - now)} 남았습니다.`;
      if (!secondLine) return firstLine;
      return `${firstLine}<br>${secondLine}`;
    }

    function restSundayNotice(now) {
      if (now.getDay() === 6) {
        return "내일은 일요일입니다. 노치원 쉬는 날입니다.";
      }
      return "오늘은 일요일입니다. 노치원 쉬는 날입니다.";
    }

    function getState(now) {
      const day = now.getDay(); // 0 일, 1 월, ..., 6 토
      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      const prepareStart = PREPARE_START_HOUR * 60;
      const goStart = GO_HOUR * 60 + GO_MINUTE;
      const returnHome = RETURN_HOME_HOUR * 60 + RETURN_HOME_MINUTE;
      const exerciseStart = EXERCISE_START_HOUR * 60 + EXERCISE_START_MINUTE;
      const sleepStart = SLEEP_START_HOUR * 60;
      const sleepEnd = SLEEP_END_HOUR * 60;
      const sundayCountdownStart = SUNDAY_COUNTDOWN_START_HOUR * 60;
      const weekdayCountdownStart = WEEKDAY_COUNTDOWN_START_HOUR * 60;

      // 토요일 오후 5시 25분 ~ 오후 9시
      if (day === 6 && currentMinutes >= exerciseStart && currentMinutes < sleepStart) {
        return {
          task: "지금은 운동하는 시간입니다.<br>자전거 페달 운동을 하세요",
          notice: "내일은 일요일입니다. 노치원 쉬는 날입니다."
        };
      }

      // 토요일 오후 9시 ~ 일요일 오후 1시
      if ((day === 6 && currentMinutes >= sleepStart) || (day === 0 && currentMinutes < sundayCountdownStart)) {
        return {
          task: "지금은 휴식하는 시간입니다.",
          notice: restSundayNotice(now)
        };
      }

      // 일요일 오후 1시 ~ 일요일 오후 9시
      if (day === 0 && currentMinutes >= sundayCountdownStart && currentMinutes < sleepStart) {
        return {
          task: "지금은 휴식하는 시간입니다.",
          notice: countdownNotice(now, "시간 많이 남았습니다. 운동을 하거나 휴식을 하세요")
        };
      }

      // 일요일 오후 9시 ~ 월요일 오전 7시
      if ((day === 0 && currentMinutes >= sleepStart) || (day === 1 && currentMinutes < sleepEnd)) {
        return {
          task: "지금은 잠 자는 시간 입니다.",
          notice: countdownNotice(now, "시간 많이 남았습니다. 침대로 가서 잠을 자세요")
        };
      }

      // 월요일~토요일 오전 7시 ~ 노치원 등원 시간
      if (day >= 1 && day <= 6 && currentMinutes >= prepareStart && currentMinutes < goStart) {
        return {
          task: `${PLACE_NAME} 가는 준비는<br>이대수의 안내에 따르세요`,
          notice: countdownNotice(now, `${PLACE_NAME} 버스 타러 갈 때는 반드시 이대수와 함께 가야 합니다`)
        };
      }

      // 월요일~토요일 노치원 등원 ~ 오후 5시 25분
      if (day >= 1 && day <= 6 && currentMinutes >= goStart && currentMinutes < returnHome) {
        return {
          task: "지금은 인지 학습 시간",
          notice: `지금은 ${PLACE_NAME}에 있는 시간`
        };
      }

      // 월요일~금요일 오후 5시 25분 ~ 오후 9시
      if (day >= 1 && day <= 5 && currentMinutes >= exerciseStart && currentMinutes < sleepStart) {
        const notice = currentMinutes >= weekdayCountdownStart
          ? countdownNotice(now, "시간 많이 남았습니다. 운동을 하거나 휴식을 하세요")
          : countdownNotice(now, "시간 많이 남았습니다. 운동을 하거나 휴식을 하세요");

        return {
          task: "지금은 운동하는 시간입니다.<br>자전거 페달 운동을 하세요",
          notice
        };
      }

      // 월요일~금요일 오후 9시 ~ 다음날 오전 7시
      if ((day >= 1 && day <= 5 && currentMinutes >= sleepStart) ||
          (day >= 2 && day <= 6 && currentMinutes < sleepEnd)) {
        return {
          task: "지금은 잠 자는 시간 입니다.",
          notice: countdownNotice(now, "시간 많이 남았습니다. 침대로 가서 잠을 자세요")
        };
      }

      // 그 외 시간의 안전 기본값
      if (day === 0) {
        return {
          task: "지금은 휴식하는 시간입니다.",
          notice: restSundayNotice(now)
        };
      }

      return {
        task: "지금은 휴식하는 시간입니다.",
        notice: `오늘은 ${PLACE_NAME} 가는 날입니다.`
      };
    }

    function updateDisplayMode(now) {
      const isAway = isPatientAwayAtNochiwon(now);
      document.body.classList.toggle("away-protect-mode", isAway);

      if (modeLabelEl) {
        modeLabelEl.textContent = isAway ? "보호 모드" : "일반 모드";
      }

      // 일반 모드와 보호 모드 모두 5분마다 -10px ~ +10px 이동
      const slot = Math.floor(now.getMinutes() / 5);
      const offsets = [-10, -6, -2, 2, 6, 10];
      const offsetX = offsets[slot % offsets.length];
      const offsetY = offsets[(slot + 3) % offsets.length];

      document.querySelector(".screen").style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    }

    function brightenTemporarily() {
      document.body.classList.add("temp-bright");

      if (tempBrightTimer) {
        clearTimeout(tempBrightTimer);
      }

      tempBrightTimer = setTimeout(() => {
        document.body.classList.remove("temp-bright");
      }, TEMP_BRIGHT_SECONDS * 1000);
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        }
      } catch (error) {
        // 일부 TV 브라우저에서는 지원하지 않을 수 있습니다.
      }
    }

    function updateClock() {
      const now = new Date();
      const state = getState(now);

      dateTextEl.textContent = getDateText(now);
      weekdayTextEl.textContent = dayNames[now.getDay()];
      timeTextEl.textContent = getTimeText(now);

      taskTextEl.innerHTML = state.task;
      taskLineEl.classList.toggle("two-lines", state.task.includes("<br>"));

      noticeTextEl.innerHTML = state.notice;
      noticeLineEl.classList.toggle("multi-lines", state.notice.includes("<br>"));

      updateDisplayMode(now);
    }

    function requestFullscreenOnce() {
      const element = document.documentElement;
      const request =
        element.requestFullscreen ||
        element.webkitRequestFullscreen ||
        element.msRequestFullscreen;

      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
      }

      if (request) {
        request.call(element).catch(() => {});
      }

      if (helperEl) {
        helperEl.style.display = "none";
      }
    }

    async function activateScreenMode() {
      brightenTemporarily();
      requestFullscreenOnce();
      await requestWakeLock();
    }

    document.addEventListener("click", activateScreenMode);
    document.addEventListener("touchstart", activateScreenMode, { once: true });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await requestWakeLock();
      }
    });

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
